<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Portal — Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Job Portal <span class="sub">multi-client daily pipeline</span></h1>
    <div class="actions">
      <span id="allStatus" class="status"></span>
      <button id="runAll" class="btn primary">Run daily for ALL clients</button>
    </div>
  </header>

  <main>
    <section id="clientsView">
      <h2>Clients</h2>
      <div id="clients" class="grid"></div>
    </section>

    <section id="detailView" class="hidden">
      <button id="back" class="btn ghost">&larr; All clients</button>
      <div id="detail"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
